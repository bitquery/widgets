<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitquery Widgets — Local Demo</title>
    <link rel="stylesheet" href="../dist/assets/css/widgets.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f8f9fa;
            color: #212529;
        }
        h1 { margin-top: 0; }
        .widget-panel {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <h1>Bitquery Widgets</h1>
    <p>Local development demo. Data is fetched from the Bitquery v2 GraphQL API using your access token.</p>
    <div class="widget-panel" id="blocks-table"></div>

    <script src="local.config.js"></script>
    <script src="../dist/widgets.js"></script>
    <script>
        if (!window.BITQUERY_ACCESS_TOKEN) {
            document.body.innerHTML = '<p>Copy <code>demo/local.config.example.js</code> to <code>demo/local.config.js</code> and set your Bitquery access token.</p>';
            throw new Error('Missing BITQUERY_ACCESS_TOKEN');
        }

        widgets.init('https://streaming.bitquery.io/graphql', 'https://ide.bitquery.io', '', {
            accessToken: window.BITQUERY_ACCESS_TOKEN
        });

        var query = new widgets.query(`
            query {
                EVM(network: eth) {
                    Blocks(limit: {count: 10}) {
                        Block {
                            Number
                            Time
                            Hash
                        }
                    }
                }
            }
        `);

        widgets.table('#blocks-table', query, 'EVM.Blocks', {
            title: 'Recent Ethereum Blocks',
            dataOptions: [
                { title: 'Block Number', path: 'Block.Number' },
                { title: 'Time', path: 'Block.Time' },
                { title: 'Hash', path: 'Block.Hash', type: 'string-ellipsis' }
            ]
        });

        query.request();
    </script>
</body>
</html>
